spring.application.name=api-gateway
server.port=8080
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=user-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/users/**
spring.cloud.gateway.server.webflux.routes[2].id=transaction-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://TRANSACTION-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/accounts/**
spring.cloud.gateway.server.webflux.routes[3].id=loan-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://LOAN-SERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/loans/**
eureka.instance.instance-id=${spring.application.name}:${server.port}